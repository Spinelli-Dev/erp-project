<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolução</title>

    <!-- VINCULANDO AO BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- VINCULANDO AO .CSS -->
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/componentes.css">

    <!-- IMPORTANDO FONTE -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gravitas+One&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playwrite+IE:wght@100..400&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/images/login-logo-formulario.png">
</head>

<body>

    <!-- CARREGANDO O MENU VIA JAVASCRIPT -->
    <div id="header-placeholder"></div>

    <main class="conteudo-pagina flex-grow-1">
    <!-- HEADER PADRÃO -->
        <header class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="titulo-pagina mb-0">Vendas</h2>
           
            <!-- Data atualizada Tablet/Desktop: Aparece apenas para telas maiores -->
            <span class="data-pagina d-none d-md-block" id="data-atual"></span>
        </header>

    <!-- Filtros de Botão -->
    <div class="d-flex flex-wrap gap-2 mb-4">
        <button class="btn-filtro-evo">Dia do Mês</button>
        <button class="btn-filtro-evo">Semana</button>
        <button class="btn-filtro-evo active">Mês</button>
        <button class="btn-filtro-evo">Ano</button>
    </div>

    <!-- Card 1: Faturamento e Lucro -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="card border-0 shadow-sm p-2 p-md-4">
                <div class="mb-1">
                    <h5 class="titulo-card-evo m-0">Faturamento e Lucro</h5>
                    <p class="subtitulo-card-evo m-0">Receita bruta (linha) e lucro líquido (barras)</p>
                </div>
                <div style="position: relative; height: 350px; width: 100%;">
                    <canvas id="chartFaturamento"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Card 2: Produtos Mais Vendidos -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="card border-0 shadow-sm p-2 p-md-4">
                <div class="mb-1">
                    <h5 class="titulo-card-evo m-0">Produtos Mais Vendidos</h5>
                    <p class="subtitulo-card-evo m-0">Quantidade mais vendidos (barras) e faturamento mais vendidos (linha)</p>
                </div>
                <div style="position: relative; height: 400px; width: 100%;">
                    <canvas id="chartProdutos"></canvas>
                </div>
            </div>
        </div>
    </div>
</main>



    <footer class="rodape mt-auto">
        <p>Maxi Massas Itápolis • Sistema de Gestão v1.0</p>
    </footer>

    <script src="../js/header.js"></script>
    <script src="../js/data-atual.js"></script>
    <script src="../js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <!-- Seu arquivo JavaScript para esta tela (crie na sua pasta js) -->
    <script src="../js/evolucao.js"></script>

</body>
