<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Maxxi Massas</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Seu CSS -->
     <link rel="stylesheet" href="../frontend/css/reset.css">
    <link rel="stylesheet" href="../frontend/css/componentes.css">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/login-logo-formulario.png">
</head>
<body>
    <!-- vh-100 garante que a tela ocupe 100% da altura do monitor/celular -->
    <!-- Corpo ocupando 100% da altura, usando apenas Flexbox puro -->
<div class="d-flex flex-column flex-lg-row vh-100">
    
    <!-- BANNER (Em cima no Mobile / Esquerda no Desktop) -->
    <div class="banner-login d-flex align-items-center justify-content-center flex-column text-center position-relative">
        
        <!-- Camada escura opcional -->
        <!-- <div class="overlay-login"></div> -->
        
        <div class="texto-sobreposto px-4 d-flex flex-column align-items-center">
            <img src="../frontend/assets/images/login-logo-formulario.png" alt="Logo" class="logo-banner mb-3">
            <h1 class="titulo-banner mb-1">Maxi Massas</h1>
            <h2 class="subtitulo-banner mb-0">Itápolis — Gestão</h2>
            
            <div class="d-none d-lg-flex flex-column align-items-center mt-4">
                <p class="texto-sistema mb-3">Sistema de Gestão Comercial</p>
                <div class="divisor-banner mb-3"></div>
                <p class="texto-boas-vindas mb-0">Bem-vindo(a) de volta!</p>
            </div>
        </div>

    </div>

    <!-- FORMULÁRIO (Embaixo no Mobile / Direita no Desktop) -->
    <!-- flex-grow-1 manda o formulário preencher todo o resto da tela -->
    <div class="flex-grow-1 d-flex align-items-center justify-content-center bg-fundo-form">
    
        <div class="cartao-login">
            
            <div class="bloco-form">
                
                <!-- Logo do Formulário (Oculto no Mobile, Visível no Tablet/Desktop) -->
                <img src="../frontend/assets/images/login-logo-formulario.png" alt="Logo Maxi Massas" class="logo-form d-none d-md-block mb-4">
                
                <!-- Títulos sempre alinhados à esquerda (text-start) -->
                <h3 class="titulo-login d-block d-lg-none text-start">Bem-vindo(a) de volta!</h3>
                <h3 class="titulo-login d-none d-lg-block text-start">Acesse sua conta</h3>
                
                <p class="subtitulo-login text-start">Entre com suas credenciais para continuar</p>
                
                <form>
                    <div class="mb-3">
                        <label for="email" class="label-login">E-mail</label>
                        <input type="email" class="input-login w-100" id="email" placeholder="seu@email.com" autocomplete="off">
                    </div>
                    
                    <div class="mb-2">
                        <label for="senha" class="label-login">Senha</label>
                        <div class="position-relative">
                            <input type="password" class="input-login w-100" id="senha" placeholder="••••••••">
                            <button type="button" class="btn-mostrar-senha" onclick="alternarSenha()">
                                <img src="../frontend/assets/icons/icone-ver.svg" id="icone-senha" alt="Ver senha">
                            </button>
                        </div>
                    </div>
                    
                    <a href="#" class="link-senha">Esqueci minha senha</a>
                    
                    <!-- Caixa de Mensagem de Erro (Escondida por padrão com d-none) -->
                    <div id="mensagem-erro" class="alert alert-danger d-none py-2 text-center mt-3 mb-0" style="font-size: 0.875rem; border-radius: 8px;">
                        E-mail ou senha incorretos. Tente novamente.
                    </div>
                    
                    <!-- Adicionado o onclick para chamar nossa função -->
                    <button type="button" class="btn-login w-100 mt-4" onclick="realizarLogin()">
                        ENTRAR
                    </button>
                </form>

                <p class="rodape-login">Maxi Massas Itápolis • Sistema de Gestão v1.0</p>
                
            </div>
        </div>
    </div>

</div>

    <script src="../frontend/js/login.js"></script>
</body>
</html>
